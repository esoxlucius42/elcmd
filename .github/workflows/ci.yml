name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake qt6-default qt6-qmake qt6-base-dev qt6-tools-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -- -j2

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          mkdir -p artifacts
          cp build/elcmd artifacts/ || true
          tar -czf artifacts/elcmd-${{ github.sha }}.tar.gz -C artifacts . || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: elcmd-artifacts
          path: artifacts/